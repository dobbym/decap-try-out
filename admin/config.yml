backend:
  name: github
  repo: dobbym/decap-try-out
  branch: main
  base_url: https://decap-try-out-auth-ethchxcgb3bsgfe7.francecentral-01.azurewebsites.net
  auth_endpoint: api/auth

site_url: https://dobbym.github.io/decap-try-out
display_url: https://dobbym.github.io/decap-try-out
publish_mode: simple

media_folder: "assets/uploads"
public_folder: "/decap-try-out/assets/uploads"

collections:
  - name: "recipes"
    label: "Recipes"
    folder: "content/recipes"
    create: true
    extension: "json"
    format: "json"
    slug: "{{fields.urlFriendlyTitle}}"
    summary: "{{fields.name}}"

    fields:
      - { name: "title", label: "Recipe title", widget: "string" }

      - { name: "heading", label: "H1 override, uses title by default", widget: "string", required: false }
      - { name: "url", label: "Override canonical URL", widget: "string", required: false }
      - { name: "description", label: "Description", widget: "text", required: false, hint: "Short description for SEO meta data" }

      - name: "author"
        label: "Author"
        widget: "object"
        required: false
        fields:
          - { name: "name", label: "Name", widget: "string", required: false }
          - name: "logo"
            label: "Logo"
            widget: "object"
            required: false
            fields:
              - { name: "@type", label: "@type", widget: "string", default: "ImageObject", required: false }
              - { name: "url", label: "URL", widget: "string", required: false }   

      - name: "image"
        label: "Images"
        widget: "list"
        required: false
        fields:
          - { name: "@type", label: "@type", widget: "string", default: "ImageObject", required: false }
          - name: "url"
            label: "Image"
            widget: "image"
            required: true
            choose_url: false
          - { name: "representativeOfPage", label: "Representative of page", widget: "boolean", required: false, default: false }
          - { name: "caption", label: "Caption", widget: "string", required: true }

      - { name: "prepTime", label: "Prep time (ISO 8601)", widget: "string", required: false, hint: "Example: PT15M" }
      - { name: "cookTime", label: "Cook time (ISO 8601)", widget: "string", required: false, hint: "Example: PT45M" }
      - { name: "totalTime", label: "Total time (ISO 8601)", widget: "string", required: false, hint: "Example: PT1H" }

      - { name: "keywords", label: "Keywords", widget: "string", required: false, hint: "Comma-separated list of SEO keywords" }

      - { name: "recipeYield", label: "Recipe yield", widget: "string", required: false }
      - { name: "recipeCuisine", label: "Cuisine", widget: "string", required: false }

      - name: "nutrition"
        label: "Nutrition"
        widget: "object"
        required: false
        fields:
          - { name: "calories", label: "Calories", widget: "string", required: false, hint: "Example: 627 calories" }
          - { name: "fatContent", label: "Fat", widget: "string", required: false, hint: "Example: 18 grams fat" }
          - { name: "saturatedFatContent", label: "Saturated fat", widget: "string", required: false }
          - { name: "carbohydrateContent", label: "Carbohydrates", widget: "string", required: false }
          - { name: "sugarContent", label: "Sugar", widget: "string", required: false }
          - { name: "fiberContent", label: "Fibre", widget: "string", required: false }
          - { name: "proteinContent", label: "Protein", widget: "string", required: false }

      - name: "recipeIngredient"
        label: "Ingredients"
        widget: "list"
        required: false
        field: { name: "ingredient", label: "Ingredient", widget: "string" }
      
      - name: "tags"
        label: "Tags (hashtags)"
        widget: "list"
        required: false
        hint: "Add hashtags like #quick #vegan #glutenfree (single word; letters/numbers/underscore only)."
        field:
          name: "tag"
          label: "Tag"
          widget: "string"
          pattern:
            - '^#[A-Za-z0-9_]{1,279}$'
            - "Must be a single hashtag: start with # and use only letters, numbers, or underscore (no spaces)."

      - name: "video"
        label: "YouTube videos"
        widget: "list"
        required: false
        hint: "Add one or more YouTube links (watch, youtu.be, or embed URLs)."
        field:
          name: "url"
          label: "YouTube URL"
          widget: "string"
          pattern:
            - '^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/)[A-Za-z0-9_-]{6,}$'
            - "Must be a valid YouTube URL (e.g. https://www.youtube.com/watch?v=VIDEOID)."
      
      - name: "contentBlocks"
        label: "Page content"
        widget: "list"
        required: false
        types:
          - name: "section"
            label: "Text section"
            widget: "object"
            fields:
              - { name: "heading", label: "Subheading", widget: "string", required: false }
              - { name: "text", label: "Text", widget: "markdown", required: false }

          - name: "image"
            label: "Image"
            widget: "object"
            fields:
              - { name: "heading", label: "Subheading", widget: "string", required: false }
              - name: "image"
                label: "Image upload"
                widget: "image"
                required: true
                choose_url: false
              - { name: "alt", label: "Alt text", widget: "string", required: false }
              - { name: "caption", label: "Caption", widget: "string", required: false }

          - name: "youtube"
            label: "YouTube video"
            widget: "object"
            fields:
              - { name: "heading", label: "Subheading", widget: "string", required: false }
              - name: "url"
                label: "YouTube URL"
                widget: "string"
                required: true
                pattern:
                  - '^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/)[A-Za-z0-9_-]{6,}
                  - "Must be a valid YouTube URL (e.g. https://www.youtube.com/watch?v=VIDEOID)."
              - { name: "caption", label: "Caption", widget: "string", required: false }

      - name: "recipeInstructions"
        label: "Instructions"
        widget: "list"
        required: false
        fields:
          - { name: "heading", label: "heading", widget: "string", default: "HowToStep", required: false }
          - { name: "text", label: "Step text", widget: "text" }

      - { name: "datePublished", label: "Date Published", widget: "datetime", required: false }
      - { name: "dateModified", label: "Date Modified", widget: "datetime", required: false }