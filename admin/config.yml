backend:
  name: github
  repo: dobbym/decap-try-out
  branch: main
  auth_endpoint: https://YOUR-FUNCTION-APP-NAME.azurewebsites.net/api/auth

site_url: https://github.com/dobbym/decap-try-out
publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/decap-try-out/assets/uploads"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "date", label: "Publish Date", widget: "datetime" }
      - { name: "draft", label: "Draft", widget: "boolean", default: true }
      - { name: "body", label: "Body", widget: "markdown" }