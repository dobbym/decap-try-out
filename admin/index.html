<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Decap content manager try out</title>
  </head>

  <body>
    <script>
      // Log only auth-ish messages
      window.addEventListener("message", (event) => {
        if (typeof event.data !== "string") return;
        if (
          !event.data.startsWith("authorization:") &&
          !event.data.startsWith("authorizing:")
        )
          return;

        console.log("[Decap auth debug] incoming postMessage", {
          origin: event.origin,
          data: event.data,
        });
      });

      // Hook message-handler registration so we can see if/when Decap installs its listener
      (function () {
        const originalAddEventListener = window.addEventListener.bind(window);

        window.addEventListener = function (type, listener, options) {
          if (type === "message" && typeof listener === "function") {
            console.log("[Decap auth debug] a message listener was registered:", {
              listenerName: listener.name || "(anonymous)",
            });

            const wrapped = function (event) {
              const dataPreview =
                typeof event.data === "string"
                  ? event.data.slice(0, 200)
                  : event.data;

              const isAuthish =
                typeof event.data === "string" &&
                (event.data.startsWith("authorization:") ||
                  event.data.startsWith("authorizing:"));

              if (isAuthish) {
                console.log("[Decap auth debug] Decap message listener invoked", {
                  origin: event.origin,
                  dataPreview,
                });
              }

              return listener.call(this, event);
            };

            return originalAddEventListener(type, wrapped, options);
          }

          return originalAddEventListener(type, listener, options);
        };
      })();
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
